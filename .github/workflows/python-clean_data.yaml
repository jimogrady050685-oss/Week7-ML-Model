name: CI
on:
  workflow_dispatch:

jobs:
  data_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Confirm Python version
        run: python --version

      - name: Clean data
        run: |
          cd ModelCleaning
          pwd
          ls -al
          pip install pandas
          python cleandata.py

      - name: Train and test model
        run: |
          pip install scikit-learn joblib
          python ModelCleaning/train_test_dataset.py